<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQSync AI – Command Center</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><span class="material-icons-round"
                    style="font-size:20px;color:#fff;">emergency</span></div>
            <div class="logo-text">
                <span class="logo-name">ResQSync<span class="accent">AI</span></span>
                <span class="logo-version">V5 GLOBAL MESH</span>
            </div>
        </div>

        <nav class="nav-menu" id="navMenu">
            <a class="nav-item active" data-page="monitoring">
                <span class="material-icons-round nav-icon">radar</span> Global Monitoring
            </a>
            <a class="nav-item" data-page="sos">
                <span class="material-icons-round nav-icon">sos</span> SOS Emergency
            </a>
            <a class="nav-item" data-page="voice">
                <span class="material-icons-round nav-icon">mic</span> Voice Detection
            </a>
            <a class="nav-item" data-page="tracking">
                <span class="material-icons-round nav-icon">my_location</span> Live Tracking
            </a>
            <a class="nav-item" data-page="dashboard">
                <span class="material-icons-round nav-icon">dashboard</span> Dashboard
            </a>
            <a class="nav-item" data-page="assistant">
                <span class="material-icons-round nav-icon">smart_toy</span> AI Assistant
            </a>
            <a class="nav-item" data-page="analytics">
                <span class="material-icons-round nav-icon">analytics</span> Analytics
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="generate-btn" onclick="App.generateAlert()">
                <span class="material-icons-round" style="font-size:16px;">bolt</span> GENERATE ALERT
            </button>
            <div class="sidebar-meta">
                <div><span class="material-icons-round" style="font-size:12px;vertical-align:middle;">cell_tower</span>
                    Uplink: <span class="text-green">ESTABLISHED</span></div>
                <div><span class="material-icons-round" style="font-size:12px;vertical-align:middle;">lock</span>
                    Encryption: <span class="text-green">AES-256</span></div>
                <div><span class="material-icons-round" style="font-size:12px;vertical-align:middle;">hub</span> Nodes:
                    <span class="text-blue">47 Active</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent"></main>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- Leaflet Maps (Free, No API Key) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ai-engine.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/monitoring.js"></script>
    <script src="js/pages/sos.js"></script>
    <script src="js/pages/voice.js"></script>
    <script src="js/pages/tracking.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/assistant.js"></script>
    <script src="js/pages/analytics.js"></script>
</body>

</html>
